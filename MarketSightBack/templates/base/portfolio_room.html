{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
   {% tailwind_css %}
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="{% static 'portfolio.css' %}">
   <title>Portfolio Room</title>
   
</head>
<body>

   

      <div class="navbar">
      <a href="{% url 'assistance' %}">Support</a>
      <a href="{% url 'room' %}">Portfolio</a>

      {% if user.is_authenticated %}
         <a href="{% url 'logout_page' %}">Logout</a>
      {% else %}
         <a href="{% url 'login' %}">Login</a>
      {% endif %}
      <a href="{% url 'search' %}">Search</a>
      <!-- For Portfolio, I wanna have a redirection if the condiition is not met that will make sure users are signed up --> 
   </div>

 

   <!-- Wrapper for the stock graph  -->
    
   <section class="flex flex-col flex-wrap gap-5 items-start justify-start border-blue-300 shadow-[0_0_15px_rgba(34,211,238,0.8),inset_0_0_15px_rgba(34,211,238,0.5)] bg-gradient-to-r[from-[#434343] to-[#000000]] w-60 h-full">
        <!-- Graph -->
      <div class="flex flex-col flex-wrap gap-5 items-center justify-center">


      </div>

      <div class="flex flex-col flex-wrap gap-5 items-center justify-center ">
         {% for stocks in stock %}

         <h3 class="text-gray-200 text-[16px] items-center justify-center">{{stocks.ticker}}</h3>

         <!-- Heading -->
         <div class="stock_graph relative w-full h-full 0 mx-auto border-transparent ">
            <canvas class="stockGraph h-2/3 w-full 0 mx-auto border-2"></canvas>

         </div>
         
      </div>


         {% endfor %}

   </section>


    <div class="portfolio-summary">
        <!-- Insert AI  -->
    </div>

                  


<!-- Yahoo Finance Display -->

   
{% block scripts %}
<script>
   const portfolioStocks = {{ json_data_set_stocks|safe }};
   console.log(portfolioStocks);
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'portfolio.js'%}" defer></script>
{% endblock scripts %}



 
</body>
</html>
